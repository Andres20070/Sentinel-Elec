<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sentinel-Electric</title>
    <base href="./" />

    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="Sentinel-Electric.styles.css" rel="stylesheet" />
    <link href="manifest.webmanifest" rel="manifest" />
    <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png" />
</head>

<body style="background-color: #121212;">
    <div id="app">
        <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; color: #FFD700;">
            <div class="spinner-border" role="status" style="width: 3rem; height: 3rem;"></div>
            <h2 style="margin-top: 20px; font-family: sans-serif;">SENTINEL ELEC</h2>
            <p style="color: #00CED1;">Iniciando Terminal HMI...</p>
        </div>
    </div>

    <div id="blazor-error-ui">
        Ocurrió un error.
        <a href="." class="reload">Recargar</a>
        <span class="dismiss">🗙</span>
    </div>

    <script src="_framework/blazor.webassembly.js"></script>

    <script>
        navigator.serviceWorker.register('service-worker.js', { updateViaCache: 'none' });
    </script>
</body>

</html>
